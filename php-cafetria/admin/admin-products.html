<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetria | Products</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="admin-layout">
        <!-- ─── Sidebar ─────────────────────────── -->
        <aside class="admin-sidebar">
            <div class="admin-sidebar-header">
                <div class="logo">
                    <span class="material-symbols-outlined" style="color: var(--primary);">local_cafe</span>
                    <span>Cafetria</span>
                </div>
                <p class="subtitle">Admin Dashboard</p>
            </div>
            <nav class="admin-sidebar-nav">
                <a href="admin-dashboard.html">
                    <span class="material-symbols-outlined">space_dashboard</span> Home
                </a>
                <a href="admin-orders.html">
                    <span class="material-symbols-outlined">receipt_long</span> Orders
                </a>
                <a href="admin-products.html" class="active">
                    <span class="material-symbols-outlined">inventory_2</span> Products
                </a>
                <a href="admin-users.html">
                    <span class="material-symbols-outlined">group</span> Users
                </a>
                <a href="admin-manual-order.html">
                    <span class="material-symbols-outlined">add_shopping_cart</span> Manual Order
                </a>
                <a href="admin-checks.html">
                    <span class="material-symbols-outlined">payments</span> Checks
                </a>
            </nav>
            <div class="admin-sidebar-footer">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=admin" alt="Admin" class="avatar">
                <div class="user-info">
                    <p class="user-name">Admin User</p>
                    <p class="user-role">Manager</p>
                </div>
            </div>
        </aside>

        <!-- ─── Main Content ────────────────────── -->
        <main class="admin-main-content">
            <header class="page-header">
                <div>
                    <h1>Service <span class="highlight">Catalog</span></h1>
                    <p>Manage product pricing, availability, and images.</p>
                </div>
                <div class="header-actions">
                    <a href="admin-add-product.html" class="btn btn-primary">
                        <span class="material-symbols-outlined" style="font-size:1.125rem;">add</span>
                        Add Product
                    </a>
                </div>
            </header>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- PHP will populate rows here -->
                        <!-- Example row structure:
                        <tr>
                            <td><img src="product.jpg" class="table-img"></td>
                            <td>Black Coffee</td>
                            <td>EGP 25</td>
                            <td><span class="badge badge-available">Available</span></td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn btn-secondary btn-sm">Edit</button>
                                    <button class="btn btn-danger btn-sm">Delete</button>
                                </div>
                            </td>
                        </tr>
                        -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="../script.js"></script>
</body>
</html>
