    <style>
        /* ── Order Cards ──────────────────────── */
        .order-cards {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .order-card {
            background: var(--surface-container-lowest);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: box-shadow 0.3s ease;
        }

        .order-card:hover {
            box-shadow: var(--shadow-md);
        }

        /* Card Header: meta row */
        .order-card-header {
            display: grid;
            grid-template-columns: 2fr 2fr 1fr 1fr 1fr;
            gap: 0.5rem;
            padding: 0.875rem 1.25rem;
            background: var(--surface-container-low);
            font-size: 0.8125rem;
            font-weight: 600;
            align-items: center;
        }

        .order-card-header .label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--on-surface-variant);
            font-weight: 700;
        }

        .order-card-header .value {
            font-weight: 700;
            color: var(--on-surface);
        }

        /* Card Body: product thumbnails */
        .order-card-body {
            padding: 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .order-items-grid {
            display: flex;
            gap: var(--spacing-lg);
            flex-wrap: wrap;
        }

        .order-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.375rem;
            min-width: 80px;
        }

        .order-item-img-wrapper {
            width: 72px;
            height: 72px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-sm);
            border: 2px solid var(--surface-container);
        }

        .order-item-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .order-item-price-tag {
            position: absolute;
            top: 0.25rem;
            right: 0.25rem;
            background: var(--tertiary-container);
            color: var(--on-tertiary-container);
            font-size: 0.5625rem;
            font-weight: 800;
            padding: 0.125rem 0.375rem;
            border-radius: var(--radius-full);
        }

        .order-item-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--on-surface);
        }

        .order-item-qty {
            font-size: 0.9375rem;
            font-weight: 800;
            color: var(--primary);
        }

        .order-card-total {
            text-align: right;
            white-space: nowrap;
        }

        .order-card-total .total-label {
            font-size: 0.6875rem;
            color: var(--on-surface-variant);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .order-card-total .total-value {
            font-size: 1.25rem;
            font-weight: 800;
            font-family: var(--font-headline);
            color: var(--on-surface);
        }
    </style>
</head>
