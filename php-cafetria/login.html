<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafetria | Login</title>
    <meta name="description" content="Sign in to your Cafetria account – order your favourite drinks and meals.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --amber-50:  #FFF8E1;
            --amber-100: #FFECB3;
            --amber-200: #FFE082;
            --amber-400: #FFCA28;
            --amber-600: #FFB300;
            --amber-700: #FFA000;
            --brown-800: #4E342E;
            --brown-900: #3E2723;
            --coffee:    #6F4E37;
            --espresso:  #3C2415;
            --cream:     #FFF4E6;
            --font-body:  'Plus Jakarta Sans', system-ui, sans-serif;
            --font-display: 'Playfair Display', Georgia, serif;
        }

        html {
            scroll-behavior: auto;
        }

        body {
            font-family: var(--font-body);
            background: #0a0604;
            color: var(--cream);
            overflow-x: hidden;
            margin: 0;
            overscroll-behavior-y: none;
        }

        /* ══════════════════════════════════════
           Scroll Sequence Container
        ══════════════════════════════════════ */
        .pin-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0604;
        }

        /* ───── Background Canvas ───── */
        #bg-canvas {
            display: block;
            width: 100%;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            will-change: transform;
        }

        .video-overlay {
            position: absolute;
            inset: 0;
            background: rgba(10, 6, 4, 0.4);
            z-index: 2;
        }

        /* ───── Intro Section ───── */
        .intro-container {
            position: absolute;
            z-index: 3;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
            padding: 24px;
        }

        .intro-title {
            font-family: var(--font-display);
            font-size: clamp(3.5rem, 8vw, 6rem);
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--cream), var(--amber-200));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .intro-subtitle {
            font-size: clamp(1.1rem, 2vw, 1.3rem);
            color: rgba(255, 244, 230, 0.8);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 60px;
        }

        /* ───── Scroll Indicator ───── */
        .scroll-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .scroll-indicator span {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: rgba(255, 244, 230, 0.6);
            font-weight: 600;
        }

        .mouse-icon {
            width: 26px;
            height: 42px;
            border: 2px solid rgba(255, 244, 230, 0.4);
            border-radius: 14px;
            position: relative;
        }

        .mouse-icon::after {
            content: '';
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 8px;
            background: var(--amber-400);
            border-radius: 2px;
            animation: scrolldown 1.5s infinite;
        }

        @keyframes scrolldown {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, 15px); opacity: 0; }
        }

        /* ───── Progress Bar ───── */
        .progress-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            width: 0%;
            background: linear-gradient(90deg, var(--amber-700), var(--amber-400));
            z-index: 100;
            box-shadow: 0 0 16px rgba(255, 160, 0, 0.7);
        }

        /* ───── Loading Screen ───── */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: #0a0604;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            color: var(--amber-200);
            transition: opacity 0.5s;
        }
        
        .loading-text {
            font-family: var(--font-display);
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            text-align: center;
        }

        .loading-subtext {
            font-family: var(--font-body);
            font-size: 0.85rem;
            color: rgba(255, 244, 230, 0.5);
            max-width: 320px;
            text-align: center;
            line-height: 1.5;
            margin-top: 4px;
        }

        .loading-percentage {
            font-family: var(--font-body);
            font-size: 1rem;
            font-weight: 700;
            color: var(--amber-400);
            margin-top: 8px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 202, 40, 0.2);
            border-top-color: var(--amber-400);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ══════════════════════════════════════
           Login Section
        ══════════════════════════════════════ */
        .login-container {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            pointer-events: none; 
        }

        .login-card {
            pointer-events: auto; 
            background: rgba(255, 248, 240, 0.12);
            backdrop-filter: blur(28px) saturate(1.8);
            -webkit-backdrop-filter: blur(28px) saturate(1.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            padding: 48px 40px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 16px 56px rgba(0, 0, 0, 0.5),
                        inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .login-logo {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--amber-600), var(--coffee));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 32px rgba(255, 160, 0, 0.35);
        }

        .login-logo .material-symbols-outlined {
            font-size: 2.2rem;
            color: #fff;
            font-variation-settings: 'FILL' 1;
        }

        .login-heading {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--cream);
            margin-bottom: 6px;
        }

        .login-heading .highlight {
            color: var(--amber-400);
        }

        .login-sub {
            font-size: 0.95rem;
            color: rgba(255, 244, 230, 0.55);
            margin-bottom: 36px;
            font-weight: 400;
        }

        .login-form {
            text-align: left;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 236, 179, 0.85);
            margin-bottom: 8px;
            letter-spacing: 0.02em;
        }

        .form-control {
            width: 100%;
            padding: 15px 18px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.07);
            color: var(--cream);
            font-family: var(--font-body);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-control::placeholder {
            color: rgba(255, 244, 230, 0.25);
        }

        .form-control:focus {
            border-color: var(--amber-400);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(255, 202, 40, 0.15);
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--amber-600), var(--coffee));
            color: #fff;
            font-family: var(--font-body);
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            box-shadow: 0 6px 20px rgba(255, 160, 0, 0.3);
            transition: all 0.3s ease;
            will-change: transform;
        }

        .btn-login:hover {
            box-shadow: 0 8px 30px rgba(255, 160, 0, 0.45);
        }

        .forget-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 0.85rem;
            color: var(--amber-200);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.25s ease;
        }

        .forget-link:hover {
            color: var(--amber-400);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Preloading Magic...</div>
        <div class="loading-subtext">Fetching Image Sequence for 60fps buttery smooth scrolling.</div>
        <div class="loading-percentage" id="loading-percentage">0%</div>
    </div>

    <!-- Progress Indicator -->
    <div class="progress-bar" id="progress-bar"></div>

    <!-- Main Pinned Container -->
    <div class="pin-container" id="pin-container">
        
        <!-- Canvas Layer for Image Sequence -->
        <canvas id="bg-canvas"></canvas>

        <!-- Dark Overlay -->
        <div class="video-overlay" id="video-overlay"></div>
        
        <!-- Intro Text -->
        <div class="intro-container" id="intro-container">
            <h1 class="intro-title">Cafetria</h1>
            <p class="intro-subtitle">A New Experience</p>
            
            <div class="scroll-indicator">
                <span>Scroll to unveil</span>
                <div class="mouse-icon"></div>
            </div>
        </div>
        
        <!-- Login Form -->
        <div class="login-container">
            <div class="login-card" id="login-card">
                <div class="login-logo anim-item">
                    <span class="material-symbols-outlined">local_cafe</span>
                </div>

                <h2 class="login-heading anim-item">Welcome <span class="highlight">Back</span></h2>
                <p class="login-sub anim-item">Sign in to start ordering</p>

                <form class="login-form" method="POST" action="">
                    <div class="form-group anim-item">
                        <label class="form-label" for="login-email">Email Address</label>
                        <input type="email" id="login-email" name="email" class="form-control" placeholder="you@cafetria.com" required autocomplete="email">
                    </div>

                    <div class="form-group anim-item">
                        <label class="form-label" for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <button type="submit" class="btn-login anim-item" id="btn-login">
                        <span class="material-symbols-outlined">login</span>
                        Login
                    </button>

                    <a href="#" class="forget-link anim-item">Forgot Password?</a>
                </form>
            </div>
        </div>
        
    </div>

    <!-- GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const canvas = document.getElementById("bg-canvas");
        const ctx = canvas.getContext("2d");
        const container = document.getElementById("pin-container");
        const loadingPercentage = document.getElementById("loading-percentage");
        const loadingScreen = document.getElementById('loading-screen');

        // ===============================================
        // Array Setup for ezgif-frame-001.jpg -> 240.jpg
        // ===============================================
        const frameCount = 240; 
        const imageUrls = [];
        
        for (let i = 1; i <= frameCount; i++) {
            const padIndex = i.toString().padStart(3, '0');
            imageUrls.push(`frames/ezgif-frame-${padIndex}.jpg`);
        }

        const images = [];
        const frameRef = { frame: 0 };
        let imagesLoaded = 0;

        // ===============================================
        // 1. Preload Images
        // ===============================================
        function preloadImages() {
            if(frameCount === 0) {
                initScrollAnimations();
                return;
            }

            for (let i = 0; i < frameCount; i++) {
                const img = new Image();
                
                img.onload = () => {
                    imagesLoaded++;
                    loadingPercentage.innerText = Math.round((imagesLoaded / frameCount) * 100) + '%';
                    if (imagesLoaded === frameCount) initScrollAnimations();
                };
                
                img.onerror = () => {
                    // Fail gracefully so missing images don't freeze the page
                    imagesLoaded++;
                    loadingPercentage.innerText = Math.round((imagesLoaded / frameCount) * 100) + '%';
                    if (imagesLoaded === frameCount) initScrollAnimations();
                };
                
                img.src = imageUrls[i];
                images.push(img);
            }
        }

        // ===============================================
        // 2. drawFrame Helper (object-fit cover equivalent)
        // ===============================================
        function drawFrame(i) {
            if (!ctx) return;
            const img = images[i];
            
            if (!img || !img.complete || img.naturalWidth === 0) return;

            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;

            if (canvas.width !== Math.round(rect.width * dpr) || canvas.height !== Math.round(rect.height * dpr)) {
                canvas.width = Math.round(rect.width * dpr);
                canvas.height = Math.round(rect.height * dpr);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            }

            ctx.clearRect(0, 0, rect.width, rect.height);

            const scale = Math.max(rect.width / img.width, rect.height / img.height);
            const drawWidth = img.width * scale;
            const drawHeight = img.height * scale;
            const x = (rect.width - drawWidth) / 2;
            const y = (rect.height - drawHeight) / 2;

            ctx.drawImage(img, x, y, drawWidth, drawHeight);
        }

        window.addEventListener("resize", () => {
            requestAnimationFrame(() => {
                const i = Math.round(frameRef.frame);
                drawFrame(i);
            });
        });

        // ===============================================
        // 3. Create GSAP Timeline Tied To Scroll
        // ===============================================
        function initScrollAnimations() {
            loadingScreen.style.opacity = '0';
            setTimeout(() => loadingScreen.style.display = 'none', 500);

            drawFrame(0); // Paint first frame

            gsap.to('#progress-bar', {
                width: '100%', ease: 'none',
                scrollTrigger: { trigger: container, start: 'top top', end: '+=4000', scrub: true }
            });

            const tl = gsap.timeline({
                scrollTrigger: {
                    trigger: container,
                    start: "top top",
                    end: "+=4000",
                    scrub: 0.5, // 0.5 smoothing for perfect image scrolling
                    pin: true,
                    invalidateOnRefresh: true,
                }
            });

            // Set initially hidden state before scrolling
            gsap.set("#login-card", { autoAlpha: 0, y: 100 });
            gsap.set(".anim-item", { autoAlpha: 0, y: 20 });

            // Fade out intro text
            tl.to("#intro-container", { opacity: 0, y: -100, duration: 0.1 }, 0);

            // ──────── RUN THE IMAGE SEQUENCE ────────
            tl.to(frameRef, {
                frame: Math.max(0, images.length - 1),
                ease: "none",
                duration: 0.6, // Play frames across 60% of total scroll
                onUpdate: () => {
                    const i = Math.round(frameRef.frame);
                    if (i >= 0 && i < images.length) {
                        drawFrame(i);
                    }
                }
            }, 0.1);

            // Darken overlay as we reach the end of the frames
            tl.to("#video-overlay", { background: "rgba(10, 6, 4, 0.85)", duration: 0.1 }, 0.65);

            // Unveil Login Card noticeably earlier in the scroll
            tl.to("#login-card", 
                { autoAlpha: 1, y: 0, duration: 0.1, ease: "power2.out" }, 
                0.7
            );

            // Animate Internal Form items
            const animItems = document.querySelectorAll('.anim-item');
            tl.to(animItems, { 
                autoAlpha: 1, 
                y: 0, 
                duration: 0.05, 
                stagger: 0.015,
                ease: "power2.out"
            }, 0.75);
        }

        // Fire it up
        preloadImages();

        // ────────────────────────────────
        // Miscellaneous Element Logic
        // ────────────────────────────────
        const btnLogin = document.getElementById('btn-login');
        if (btnLogin) {
            btnLogin.addEventListener('mouseenter', () => gsap.to(btnLogin, { scale: 1.03, duration: 0.25, ease: 'power2.out'}));
            btnLogin.addEventListener('mouseleave', () => gsap.to(btnLogin, { scale: 1, duration: 0.3, ease: 'power2.inOut'}));
        }
    </script>
</body>
</html>
